# GHRecon Secret Patterns Configuration
# Add custom patterns here to extend the built-in detection engine.
# Each pattern should be a valid Python regex.

patterns:
  # Cloud Providers
  aws_access_key: 'AKIA[0-9A-Z]{16}'
  aws_secret: '(?i)aws[_\s]*secret[_\s]*(?:access)?[_\s]*key[_\s]*[:=][_\s]*[''"]?([A-Za-z0-9/+=]{40})[''"]?'
  azure_storage: 'DefaultEndpointsProtocol=https;AccountName=[^;]+;AccountKey=[A-Za-z0-9+/=]{88};'
  gcp_service_account: '"type"\s*:\s*"service_account"'

  # GitHub
  github_pat: 'ghp_[a-zA-Z0-9]{36}|github_pat_[a-zA-Z0-9]{22}_[a-zA-Z0-9]{59}'
  github_oauth: 'gho_[a-zA-Z0-9]{36}'
  github_app: '(?:ghu|ghs)_[a-zA-Z0-9]{36}'

  # Communication
  slack_token: 'xox[baprs]-[0-9]{10,13}-[0-9]{10,13}-[a-zA-Z0-9]{24,}'
  slack_webhook: 'https://hooks\.slack\.com/services/T[a-zA-Z0-9_]+/B[a-zA-Z0-9_]+/[a-zA-Z0-9_]+'
  discord_token: '(?:mfa\.[a-zA-Z0-9_-]{84}|[a-zA-Z0-9_-]{24}\.[a-zA-Z0-9_-]{6}\.[a-zA-Z0-9_-]{27})'
  telegram_bot: '[0-9]{8,10}:[a-zA-Z0-9_-]{35}'

  # Payment
  stripe_live: 'sk_live_[0-9a-zA-Z]{24,}'
  stripe_restricted: 'rk_live_[0-9a-zA-Z]{24,}'
  square_token: 'sq0csp-[0-9A-Za-z_-]{43}'

  # AI/ML
  openai_api: 'sk-[a-zA-Z0-9]{20}T3BlbkFJ[a-zA-Z0-9]{20}'
  openai_api_v2: 'sk-(?:proj-)?[a-zA-Z0-9_-]{40,}'

  # Email/Marketing
  sendgrid_api: 'SG\.[a-zA-Z0-9_-]{22}\.[a-zA-Z0-9_-]{43}'
  mailgun_api: 'key-[0-9a-zA-Z]{32}'

  # Infrastructure
  private_key: '-----BEGIN (?:RSA |EC |OPENSSH |DSA |PGP )?PRIVATE KEY(?:\sBLOCK)?-----'
  jwt: 'eyJ[A-Za-z0-9_-]*\.eyJ[A-Za-z0-9_-]*\.[A-Za-z0-9_-]*'
  connection_string: '(?i)(?:jdbc|mongodb(?:\+srv)?|mysql|postgresql|redis|amqp)://[^\s''\"]{10,}'
  password_var: '(?i)(?:password|passwd|pwd|pass|db_pass|api_pass)\s*[:=]\s*[''"]([^''\"]{8,})[''"]'

# Entropy settings
entropy:
  min_length: 16
  threshold: 4.5
  keywords:
    - api
    - key
    - token
    - secret
    - password
    - auth
    - credential
    - private
    - access
    - bearer

# File patterns to always scan
high_value_files:
  - '.env'
  - '.env.*'
  - 'config.json'
  - 'config.yaml'
  - 'settings.py'
  - 'docker-compose.yml'
  - 'Dockerfile'
  - '.github/workflows/*.yml'
  - 'Jenkinsfile'
  - '*.tf'
  - '*.tfvars'

# Directories to skip
skip_dirs:
  - .git
  - node_modules
  - vendor
  - venv
  - __pycache__
  - .tox
  - dist
  - build
